services:
  frontend:
    build: ./front
    ports: ["3000:3000"]
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on: [backend]

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/diet_care
      AI_SERVICE_URL: http://ai-service:8100
      REDIS_URL: redis://redis:6379/0
    depends_on: [mongo, ai-service, redis]
    volumes:
      - ./backend:/app

  ai-service:
    build: ./ai-service
    ports: ["8100:8100"]
    env_file: .env
    environment:
      VISION_API_KEY: ${VISION_API_KEY}
      VISION_API_BASE_URL: ${VISION_API_BASE_URL}
      VISION_MODEL: ${VISION_MODEL}
    volumes:
      - ./ai-service:/app
    # 외부 Vision API(OpenAI/NVIDIA NIM 등)를 호출하는 구조로 변경되어
    # 더 이상 로컬 GPU가 필요하지 않다.

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

volumes:
  mongo_data:
